<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#0099CC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Trackpad outline -->
  <rect x="28" y="28" width="72" height="72" rx="14" fill="none" stroke="#2A2A2A" stroke-width="1.5"/>

  <!-- Inner surface -->
  <rect x="36" y="36" width="56" height="56" rx="8" fill="#141414"/>

  <!-- Touch point -->
  <circle cx="64" cy="60" r="5" fill="url(#a)"/>
  <circle cx="64" cy="60" r="10" fill="url(#a)" opacity="0.15"/>
  <circle cx="64" cy="60" r="18" fill="url(#a)" opacity="0.05"/>

  <!-- Trail -->
  <path d="M48 76 L56 68 L64 60" stroke="url(#a)" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>

</svg>